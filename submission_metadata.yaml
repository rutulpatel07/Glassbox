methodology_summary: >
  Glass-box deterministic ranker (no AI/LLM/network during ranking).
  Five-phase pipeline: (1) multiprocessing feature extraction via six scoring
  layers — L0 honeypot/impossibility gate, L1 role-fit gate that defeats
  keyword-stuffers, L2 layered domain-evidence reading of career descriptions
  (explicit retrieval/LTR/recsys/vector/eval signal vs. hard-capped adjacent
  plain-ML signal), L3 nine-pillar fit scoring (domain evidence, skill substance,
  seniority, product-vs-services, external validation, eval frameworks, semantic
  similarity, Python signal, location, notice, platform quality), L4
  do-NOT-want multiplicative penalties (research-only, IT-services-only,
  CV/robotics, job-hopping), L5 behavioral availability multiplier;
  (2) population calibration — three distribution-sensitive pillars replaced
  by percentile ranks across the full 100 K pool; (3) Isolation Forest anomaly
  detection as an unsupervised second-opinion honeypot layer; (4) bootstrap
  rank-confidence from 500 log-normal weight perturbations; (5) deterministic
  sort and spec-compliant CSV output. The reasoning column is a deterministic
  readout of the same score trace — every claim is grounded in the candidate's
  profile data and cannot contradict the rank or hallucinate. Scored against
  500 hand-labeled tiers: COMPOSITE 0.7229 (NDCG@10 0.7964, NDCG@50 0.7417,
  MAP 0.3482, P@10 1.0000).
